services:
  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arquixpress-api2
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_WRITE_URL: jdbc:postgresql://10.43.100.124:15432/arquixpress
      SPRING_DATASOURCE_WRITE_USERNAME: ${APP_DB_USER}
      SPRING_DATASOURCE_WRITE_PASSWORD: ${APP_DB_PASSWORD}
      SPRING_DATASOURCE_READ_URL: jdbc:postgresql://10.43.100.124:15433/arquixpress
      SPRING_DATASOURCE_READ_USERNAME: ${APP_DB_USER}
      SPRING_DATASOURCE_READ_PASSWORD: ${APP_DB_PASSWORD}
      DB_URL: jdbc:postgresql://10.43.100.124:15432/arquixpress
      DB_USERNAME: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://10.43.100.124:15432/arquixpress
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_FLYWAY_DRIVER_CLASS_NAME: org.postgresql.Driver
      READ_REPLICA_ENABLED: "true"
      READ_DB_URL: jdbc:postgresql://10.43.100.124:15433/arquixpress
      READ_DB_USERNAME: ${APP_DB_USER}
      READ_DB_PASSWORD: ${APP_DB_PASSWORD}
      READ_DB_DRIVER: org.postgresql.Driver
      APP_MAIL_ENABLED: "false"
      NOTIFICATIONS_ENABLED: "true"
      APP_URL: http://10.43.98.219
