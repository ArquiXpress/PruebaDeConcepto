global
  log stdout format raw local0

defaults
  log global
  mode tcp
  timeout connect 3s
  timeout client 30s
  timeout server 30s

frontend pg_read_front
  bind *:15433
  default_backend pg_read_replicas

backend pg_read_replicas
  balance roundrobin
  option tcp-check
  tcp-check connect
  server reader1 10.43.97.250:5433 check
  server reader2 10.43.101.72:5432 check
  server reader3 10.43.101.72:5433 check
