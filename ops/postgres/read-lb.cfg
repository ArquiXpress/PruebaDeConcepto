global
  log stdout format raw local0

defaults
  log global
  mode tcp
  timeout connect 3s
  timeout client 30s
  timeout server 30s

frontend pg_read_front
  bind *:5432
  default_backend pg_read_replicas

backend pg_read_replicas
  balance roundrobin
  option tcp-check
  tcp-check connect
  server replica1 postgres-replica-1:5432 check
  server replica2 postgres-replica-2:5432 check
  server replica3 postgres-replica-3:5432 check
