server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: arquixpress-marketplace-poc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/arquixpress}
    username: ${DB_USERNAME:arquixpress}
    password: ${DB_PASSWORD:arquixpress}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    validate-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  read-replica:
    enabled: ${READ_REPLICA_ENABLED:false}
    datasource:
      url: ${READ_DB_URL:jdbc:postgresql://localhost:5432/arquixpress_read}
      username: ${READ_DB_USERNAME:arquixpress}
      password: ${READ_DB_PASSWORD:arquixpress}
      driver-class-name: ${READ_DB_DRIVER:org.postgresql.Driver}
  payment:
    approval-rate: ${PAYMENT_APPROVAL_RATE:0.90}
    timeout-rate: ${PAYMENT_TIMEOUT_RATE:0.00}
    min-latency-ms: ${PAYMENT_MIN_LATENCY_MS:20}
    max-latency-ms: ${PAYMENT_MAX_LATENCY_MS:120}
  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}
    retry-delay: ${NOTIFICATIONS_RETRY_DELAY:5000}
    resend-api-key: ${RESEND_API_KEY:re_test_key}
    from-email: ${NOTIFICATIONS_FROM_EMAIL:noreply@arquixpress.com}
    app-url: ${APP_URL:http://localhost:4200}