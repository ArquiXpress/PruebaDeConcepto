services:
  db-ha-controller:
    image: alpine:3.20
    container_name: arquixpress-db-ha-controller
    command: ["sh", "/db-ha-controller.sh"]
    environment:
      PRIMARY_HOST: postgres
      REPLICA_HOST: postgres-replica-1
      REPLICA_HOSTS: postgres-replica-1 postgres-replica-2 postgres-replica-3
      DB_NAME: arquixpress
      DB_USER: arquixpress
      DB_PASSWORD: arquixpress
    ports:
      - "15432:5432"
    volumes:
      - ./ops/postgres/db-ha-controller.sh:/db-ha-controller.sh:ro
      - db-ha-state:/state
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: arquixpress-postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c wal_keep_size=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-replica-1:
    image: postgres:16-alpine
    container_name: arquixpress-postgres-replica-1
    user: postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_REPLICATION_USER: repl_user
      POSTGRES_REPLICATION_PASSWORD: repl_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-1-data:/var/lib/postgresql/data
      - ./ops/postgres/replica-init.sh:/replica-init.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-replica-2:
    image: postgres:16-alpine
    container_name: arquixpress-postgres-replica-2
    user: postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_REPLICATION_USER: repl_user
      POSTGRES_REPLICATION_PASSWORD: repl_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-replica-2-data:/var/lib/postgresql/data
      - ./ops/postgres/replica-init.sh:/replica-init.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-replica-3:
    image: postgres:16-alpine
    container_name: arquixpress-postgres-replica-3
    user: postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_REPLICATION_USER: repl_user
      POSTGRES_REPLICATION_PASSWORD: repl_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-replica-3-data:/var/lib/postgresql/data
      - ./ops/postgres/replica-init.sh:/replica-init.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/replica-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-read-lb:
    image: haproxy:2.9-alpine
    container_name: arquixpress-db-read-lb
    ports:
      - "15433:5432"
    volumes:
      - ./ops/postgres/read-lb.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
      postgres-replica-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-1:
    build: .
    container_name: arquixpress-api-1
    environment: &api_env
      DB_URL: jdbc:postgresql://db-ha-controller:5432/arquixpress
      DB_USERNAME: arquixpress
      DB_PASSWORD: arquixpress
      DB_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_FLYWAY_DRIVER_CLASS_NAME: org.postgresql.Driver
      READ_REPLICA_ENABLED: "true"
      READ_DB_URL: jdbc:postgresql://db-read-lb:5432/arquixpress
      READ_DB_USERNAME: arquixpress
      READ_DB_PASSWORD: arquixpress
      READ_DB_DRIVER: org.postgresql.Driver
      PAYMENT_APPROVAL_RATE: "0.92"
      PAYMENT_TIMEOUT_RATE: "0.02"
      PAYMENT_MIN_LATENCY_MS: "30"
      PAYMENT_MAX_LATENCY_MS: "180"
      APP_MAIL_ENABLED: "true"
      APP_MAIL_FROM: no-reply@arquixpress.com
      APP_RESET_BASE_URL: http://localhost:4200/recuperar-clave
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
      NOTIFICATIONS_ENABLED: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-re_test_key}
      NOTIFICATIONS_FROM_EMAIL: ${NOTIFICATIONS_FROM_EMAIL:-onboarding@resend.dev}
      APP_URL: "http://localhost:4200"
    expose:
      - "8080"
    depends_on:
      db-ha-controller:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy
      mailpit:
        condition: service_started

  api-2:
    build: .
    container_name: arquixpress-api-2
    environment: *api_env
    expose:
      - "8080"
    depends_on:
      db-ha-controller:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy

  lb:
    image: nginx:1.27-alpine
    container_name: arquixpress-lb
    ports:
      - "8080:8080"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2

  mailpit:
    image: axllent/mailpit:v1.24
    container_name: arquixpress-mailpit
    ports:
      - "8025:8025"
    expose:
      - "1025"

  frontend:
    build:
      context: ./frontend
    container_name: arquixpress-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - lb

volumes:
  db-ha-state:
  postgres-data:
  postgres-replica-1-data:
  postgres-replica-2-data:
  postgres-replica-3-data:
