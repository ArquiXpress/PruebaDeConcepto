services:
  db-router:
    image: alpine:3.20
    container_name: arquixpress-db-router
    command: ["sh", "/db-router.sh"]
    ports:
      - "15432:5432"
    volumes:
      - ./ops/postgres/db-router.sh:/db-router.sh:ro
      - db-router-state:/state
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_started

  db-arbiter:
    image: alpine:3.20
    container_name: arquixpress-db-arbiter
    command: ["sh", "/db-arbiter.sh"]
    volumes:
      - ./ops/postgres/db-arbiter.sh:/db-arbiter.sh:ro
      - db-router-state:/state
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: arquixpress-postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c wal_keep_size=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquixpress -d arquixpress"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-replica:
    image: postgres:16-alpine
    container_name: arquixpress-postgres-replica
    user: postgres
    environment:
      POSTGRES_DB: arquixpress
      POSTGRES_USER: arquixpress
      POSTGRES_PASSWORD: arquixpress
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_MASTER_HOST: postgres
      POSTGRES_REPLICATION_USER: repl_user
      POSTGRES_REPLICATION_PASSWORD: repl_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./ops/postgres/replica-init.sh:/replica-init.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/replica-init.sh"]

  api-1:
    build: .
    container_name: arquixpress-api-1
    environment: &api_env
      DB_URL: jdbc:postgresql://db-router:5432/arquixpress
      DB_USERNAME: arquixpress
      DB_PASSWORD: arquixpress
      DB_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_FLYWAY_DRIVER_CLASS_NAME: org.postgresql.Driver
      READ_REPLICA_ENABLED: "false"
      READ_DB_URL: jdbc:postgresql://postgres-replica:5432/arquixpress
      READ_DB_USERNAME: arquixpress
      READ_DB_PASSWORD: arquixpress
      READ_DB_DRIVER: org.postgresql.Driver
      PAYMENT_APPROVAL_RATE: "0.92"
      PAYMENT_TIMEOUT_RATE: "0.02"
      PAYMENT_MIN_LATENCY_MS: "30"
      PAYMENT_MAX_LATENCY_MS: "180"
      NOTIFICATIONS_ENABLED: "true"
      RESEND_API_KEY: "re_fdCY3Sya_AmFzAxycSuYkb3fvPibFA6ko"
      NOTIFICATIONS_FROM_EMAIL: "onboarding@resend.dev"
      APP_URL: "http://localhost:4200"
    expose:
      - "8080"
    depends_on:
      db-router:
        condition: service_started

  api-2:
    build: .
    container_name: arquixpress-api-2
    environment: *api_env
    expose:
      - "8080"
    depends_on:
      db-router:
        condition: service_started
      postgres-replica:
        condition: service_started

  lb:
    image: nginx:1.27-alpine
    container_name: arquixpress-lb
    ports:
      - "8080:8080"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2

  frontend:
    build:
      context: ./frontend
    container_name: arquixpress-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - lb

volumes:
  db-router-state:
  postgres-data:
  postgres-replica-data:
