<main class="page">
  <section class="panel">
    <div class="panel-head">
      <h1>Crear cuenta</h1>
      <a routerLink="/login">Ya tengo cuenta</a>
    </div>

    <p class="muted">Registrate para comprar, vender o administrar el marketplace.</p>

    <div class="form">
      <label>
        Nombre visible
        <input [(ngModel)]="displayName" type="text" />
      </label>
      <label>
        Telefono
        <input [(ngModel)]="phone" type="tel" />
      </label>
      <label>
        Email
        <input [(ngModel)]="email" type="email" />
      </label>
      <label>
        Clave
        <input [(ngModel)]="password" type="password" />
      </label>
      <label>
        Direccion
        <input [(ngModel)]="address" type="text" />
      </label>
      <label>
        Ciudad
        <select [(ngModel)]="city">
          <option value="">Selecciona una ciudad</option>
          <option *ngFor="let cityOption of cityOptions" [ngValue]="cityOption">{{ cityOption }}</option>
        </select>
      </label>
      <label>
        Documento
        <input [(ngModel)]="documentNumber" type="text" />
      </label>
      <label>
        Foto de perfil
        <input [(ngModel)]="avatarUrl" type="url" placeholder="URL de imagen" />
      </label>
      <button type="button" class="primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Creando...' : 'Registrarme' }}
      </button>
      <p class="error" *ngIf="error">{{ error }}</p>
    </div>
  </section>
</main>
