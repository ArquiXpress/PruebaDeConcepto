<main class="page">
  <section class="panel">
    <div class="panel-head">
      <h1>Entrar</h1>
      <a routerLink="/registro">Crear cuenta</a>
    </div>

    <p class="muted">Accede con tu cuenta para comprar, vender o administrar el marketplace.</p>

    <div class="form">
      <label>
        Email
        <input [(ngModel)]="email" type="email" />
      </label>
      <label>
        Clave
        <input [(ngModel)]="password" type="password" />
      </label>
      <button type="button" class="primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Iniciar sesion' }}
      </button>
      <a routerLink="/recuperar-clave">Olvide mi clave</a>
      <p class="error" *ngIf="error">{{ error }}</p>
    </div>
  </section>
</main>
