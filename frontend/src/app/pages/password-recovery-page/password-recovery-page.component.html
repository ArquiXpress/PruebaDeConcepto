<main class="page">
  <section class="panel">
    <div class="panel-head">
      <h1>Recuperar clave</h1>
      <a routerLink="/login">Volver al login</a>
    </div>

    <p class="muted">Solicita un token por correo y define una nueva clave.</p>

    <div class="form">
      <label>
        Email
        <input [(ngModel)]="email" type="email" />
      </label>
      <button type="button" class="primary" (click)="requestReset()" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar token por email' }}
      </button>

      <label>
        Token recibido
        <input [(ngModel)]="token" type="text" />
      </label>
      <label>
        Nueva clave
        <input [(ngModel)]="newPassword" type="password" />
      </label>
      <button type="button" class="primary" (click)="confirmReset()" [disabled]="resetting || !token">
        {{ resetting ? 'Actualizando...' : 'Cambiar clave' }}
      </button>

      <p class="success" *ngIf="message">{{ message }}</p>
      <p class="error" *ngIf="error">{{ error }}</p>
    </div>
  </section>
</main>
