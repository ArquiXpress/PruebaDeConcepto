<main class="page">
  <section class="panel">
    <div class="panel-head">
      <h1>Recuperar clave</h1>
      <a routerLink="/login">Volver al login</a>
    </div>

    <p class="muted" *ngIf="!hasResetToken()">Te enviaremos un enlace para cambiar tu clave.</p>
    <p class="muted" *ngIf="hasResetToken()">Define tu nueva clave para terminar la recuperacion.</p>

    <div class="form">
      <ng-container *ngIf="!hasResetToken(); else resetForm">
        <label>
          Email
          <input [(ngModel)]="email" type="email" autocomplete="email" />
        </label>
        <button type="button" class="primary" (click)="requestReset()" [disabled]="loading || !email">
          {{ loading ? 'Enviando...' : 'Enviar enlace por email' }}
        </button>
      </ng-container>

      <ng-template #resetForm>
        <label>
          Nueva clave
          <input [(ngModel)]="newPassword" type="password" autocomplete="new-password" />
        </label>
        <label>
          Confirmar clave
          <input [(ngModel)]="confirmPassword" type="password" autocomplete="new-password" />
        </label>
        <button type="button" class="primary" (click)="confirmReset()" [disabled]="resetting || !newPassword || !confirmPassword">
          {{ resetting ? 'Actualizando...' : 'Cambiar clave' }}
        </button>
      </ng-template>

      <p class="success" *ngIf="message">{{ message }}</p>
      <p class="error" *ngIf="error">{{ error }}</p>
    </div>
  </section>
</main>
